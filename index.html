<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Luck Casino</title>
  <script data-goatcounter="https://pirate-bytes.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #frame-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 960px;
      height: 540px;
      transform-origin: center center;
      /* transform: translate(-50%, -50%) scale(n) — set by JS */
    }

    iframe {
      display: block;
      width: 960px;
      height: 540px;
      border: none;
    }
  </style>
</head>
<body>
  <div id="frame-wrap">
    <iframe id="game" src="submission/submission.html" allowtransparency="true"></iframe>
  </div>

  <script>
    (function () {
      const wrap   = document.getElementById('frame-wrap');
      const iframe = document.getElementById('game');

      function scaleGame() {
        const scale = Math.min(1, window.innerWidth / 960, window.innerHeight / 540);
        wrap.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
      }
      scaleGame();
      window.addEventListener('resize', scaleGame);

      // Fire adStarted as soon as the iframe loads
      iframe.addEventListener('load', function () {
        iframe.contentWindow.postMessage({ type: 'adStarted' }, '*');
      });

      // Relay messages from the submission back so success/fail work
      window.addEventListener('message', function (event) {
        if (!event.data || !event.data.type) return;
        // success/fail: just reload the page (same as the dev shell)
        if (event.data.type === 'success' || event.data.type === 'fail') {
          setTimeout(function () { window.location.reload(); }, 800);
        }
        // pause/play/seekTo etc. have no video to act on here — silently ignored
      });
    })();
  </script>
</body>
</html>
