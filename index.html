<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Luck Casino</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #frame-wrap {
      position: relative;
      width: 960px;
      height: 540px;
    }

    iframe {
      display: block;
      width: 960px;
      height: 540px;
      border: none;
    }
  </style>
</head>
<body>
  <div id="frame-wrap">
    <iframe id="game" src="submission/submission.html" allowtransparency="true"></iframe>
  </div>

  <script>
    (function () {
      const iframe = document.getElementById('game');

      // Fire adStarted as soon as the iframe loads
      iframe.addEventListener('load', function () {
        iframe.contentWindow.postMessage({ type: 'adStarted' }, '*');
      });

      // Relay messages from the submission back so success/fail work
      window.addEventListener('message', function (event) {
        if (!event.data || !event.data.type) return;
        // success/fail: just reload the page (same as the dev shell)
        if (event.data.type === 'success' || event.data.type === 'fail') {
          setTimeout(function () { window.location.reload(); }, 800);
        }
        // pause/play/seekTo etc. have no video to act on here — silently ignored
      });
    })();
  </script>
</body>
</html>
