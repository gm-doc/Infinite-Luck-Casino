<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Luck Casino</title>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Inline&display=swap" rel="stylesheet">
  <script data-goatcounter="https://pirate-bytes.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Single scalable container: tabs (44px) + iframe (540px) = 584px total */
    #game-container {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 960px;
      height: 584px;
      transform-origin: center center;
      display: flex;
      flex-direction: column;
      /* transform: translate(-50%, -50%) scale(n) — set by JS */
    }

    /* ── Tab bar ── */
    #tab-bar {
      width: 960px;
      height: 44px;
      background: #0a0015;
      border-bottom: 3px solid #ffd700;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 0 12px;
      flex-shrink: 0;
    }

    .tab-btn {
      font-family: 'Bungee', sans-serif;
      font-size: 13px;
      padding: 7px 20px 6px;
      border: 2px solid #ffd700;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: #000;
      color: #ffd700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.3s, color 0.3s, box-shadow 0.15s, border-color 0.3s;
      position: relative;
      bottom: -3px; /* sit on the border */
      box-shadow: 0 0 8px #ffd70044;
    }
    .tab-btn:not(.active):hover {
      background: #111;
      box-shadow: 0 0 14px #ffd700aa;
    }
    .tab-btn.active {
      /* background, color and border-bottom-color are driven by JS per-tier */
      background: #1a0033;
      color: #ffd700;
      box-shadow: 0 0 16px #ffd700bb;
      border-color: #ffd700;
      /* hide the bottom border so the tab merges flush with the iframe */
      border-bottom: 3px solid #1a0033;
    }

    /* ── Iframe ── */
    #frame-wrap {
      width: 960px;
      height: 540px;
      flex-shrink: 0;
    }

    iframe {
      display: block;
      width: 960px;
      height: 540px;
      border: none;
    }
  </style>
</head>
<body>
  <div id="game-container">

    <div id="tab-bar">
      <button class="tab-btn active" data-src="submission/submission.html">🎡 Prize Wheel</button>
      <button class="tab-btn"        data-src="submission-slot-machine/submission.html">🎰 Slot Machine</button>
      <button class="tab-btn"        data-src="submission-scratch/submission.html">🃏 Scratch Card</button>
    </div>
    <div id="frame-wrap">
      <iframe id="game" src="submission/submission.html" allowtransparency="true"></iframe>
    </div>
  </div>

  <script>
    (function () {
      const container = document.getElementById('game-container');
      const iframe    = document.getElementById('game');
      const tabs      = document.querySelectorAll('.tab-btn');

      // Tier colour palette (matches each game's TIERS array order)
      var TIER_STYLES = [
        { bg: '#1a0033', color: '#ffd700', borderColor: '#ffd700' },
        { bg: '#2a1400', color: '#ffe066', borderColor: '#ffe066' },
        { bg: '#001828', color: '#aaddff', borderColor: '#00ccff' },
      ];

      function setActiveTierColor(tierIndex) {
        var s = TIER_STYLES[tierIndex] || TIER_STYLES[0];
        var activeTab = document.querySelector('.tab-btn.active');
        if (activeTab) {
          activeTab.style.background        = s.bg;
          activeTab.style.borderBottomColor = s.bg;
          activeTab.style.color             = s.color;
          activeTab.style.borderTopColor    = s.borderColor;
          activeTab.style.borderLeftColor   = s.borderColor;
          activeTab.style.borderRightColor  = s.borderColor;
        }
        document.getElementById('tab-bar').style.borderBottomColor = s.borderColor;
      }

      // Initialise to tier 0
      setActiveTierColor(0);

      // Scale container so tabs + iframe fit the viewport
      function scaleGame() {
        var scale = Math.min(1, window.innerWidth / 960, window.innerHeight / 584);
        container.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
      }
      scaleGame();
      window.addEventListener('resize', scaleGame);

      // Fire adStarted as soon as the iframe loads
      iframe.addEventListener('load', function () {
        iframe.contentWindow.postMessage({ type: 'adStarted' }, '*');
      });

      // Tab switching
      tabs.forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (btn.classList.contains('active')) return;
          tabs.forEach(function (t) {
            t.classList.remove('active');
            t.removeAttribute('style'); // clear any inline tier color from previous session
          });
          btn.classList.add('active');
          setActiveTierColor(0); // reset to base tier until game reports its own tier
          iframe.src = btn.dataset.src;
        });
      });

      // Relay messages from the submission
      window.addEventListener('message', function (event) {
        if (!event.data || !event.data.type) return;
        // On success/fail, reload the current game rather than the whole page
        if (event.data.type === 'success' || event.data.type === 'fail') {
          setTimeout(function () {
            const activeTab = document.querySelector('.tab-btn.active');
            iframe.src = activeTab ? activeTab.dataset.src : 'submission/submission.html';
          }, 800);
        }
        // Tier upgrade — update the active tab colour to match
        if (event.data.type === 'tierChange') {
          setActiveTierColor(event.data.tier);
        }
        // pause/play/seekTo etc. have no video here — silently ignored
      });
    })();
  </script>
</body>
</html>
