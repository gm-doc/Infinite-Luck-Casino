<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Luck Casino</title>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Inline&display=swap" rel="stylesheet">
  <script data-goatcounter="https://pirate-bytes.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Single scalable container: banner (120px) + tabs (44px) + iframe (540px) = 704px total */
    #game-container {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 960px;
      height: 704px;
      transform-origin: center center;
      display: flex;
      flex-direction: column;
      /* transform: translate(-50%, -50%) scale(n) — set by JS */
    }

    /* ── Banner ── */
    #banner {
      width: 960px;
      height: 120px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0618 70%, #000 100%);
      overflow: hidden;
      transition: background 0.6s;
    }

    /* Decorative horizontal rule lines */
    .banner-rule {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ffd700, transparent);
      transition: background 0.6s;
    }
    .banner-rule.top    { top: 10px; }
    .banner-rule.bottom { bottom: 10px; }

    #banner-title {
      font-family: 'Bungee Inline', sans-serif;
      font-size: 44px;
      color: #ffd700;
      letter-spacing: 2px;
      text-shadow: 0 0 12px #ff9900, 0 0 28px #ff4400, 0 0 48px #ff4400, 3px 3px 0 #5a0000;
      line-height: 1;
      position: relative;
      z-index: 2;
      animation: banner-pulse 2s ease-in-out infinite alternate;
      transition: color 0.6s, text-shadow 0.6s;
      white-space: nowrap;
    }
    @keyframes banner-pulse {
      from { text-shadow: 0 0 12px #ff9900, 0 0 28px #ff4400, 0 0 48px #ff4400, 3px 3px 0 #5a0000; }
      to   { text-shadow: 0 0 20px #ffcc00, 0 0 44px #ff6600, 0 0 72px #ff6600, 3px 3px 0 #5a0000; }
    }

    #banner-sub {
      font-family: 'Bungee', sans-serif;
      font-size: 12px;
      color: #ff9900;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-top: 6px;
      opacity: 0.85;
      position: relative;
      z-index: 2;
      transition: color 0.6s;
    }

    /* Flanking decorative bulbs */
    .banner-bulbs {
      position: absolute;
      top: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      padding: 12px 0;
      gap: 0;
    }
    .banner-bulbs.left  { left: 18px; }
    .banner-bulbs.right { right: 18px; }
    .bb {
      width: 9px; height: 9px; border-radius: 50%;
      animation: bb-blink 0.8s infinite alternate;
    }
    @keyframes bb-blink {
      from { opacity: 0.25; box-shadow: none; }
      to   { opacity: 1;    box-shadow: 0 0 7px 3px currentColor; }
    }

    /* ── Tab bar ── */
    #tab-bar {
      width: 960px;
      height: 44px;
      background: #0a0015;
      border-bottom: 3px solid #ffd700;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 0 12px;
      flex-shrink: 0;
    }

    .tab-btn {
      font-family: 'Bungee', sans-serif;
      font-size: 13px;
      padding: 7px 20px 6px;
      border: 2px solid #ffd700;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: #000;
      color: #ffd700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.3s, color 0.3s, box-shadow 0.15s, border-color 0.3s;
      position: relative;
      bottom: -3px; /* sit on the border */
      box-shadow: 0 0 8px #ffd70044;
    }
    .tab-btn:not(.active):hover {
      background: #111;
      box-shadow: 0 0 14px #ffd700aa;
    }
    .tab-btn.active {
      /* background, color and border-bottom-color are driven by JS per-tier */
      background: #1a0033;
      color: #ffd700;
      box-shadow: 0 0 16px #ffd700bb;
      border-color: #ffd700;
      /* hide the bottom border so the tab merges flush with the iframe */
      border-bottom: 3px solid #1a0033;
    }

    /* ── Iframe ── */
    #frame-wrap {
      width: 960px;
      height: 540px;
      flex-shrink: 0;
    }

    iframe {
      display: block;
      width: 960px;
      height: 540px;
      border: none;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="banner">
      <div class="banner-rule top"></div>
      <div class="banner-rule bottom"></div>
      <div class="banner-bulbs left"  id="bulbs-left"></div>
      <div class="banner-bulbs right" id="bulbs-right"></div>
      <div id="banner-title">🎰 INFINITE LUCK CASINO 🎰</div>
      <div id="banner-sub">✦ &nbsp; Spin to Win &nbsp; ✦ &nbsp; Play Free &nbsp; ✦ &nbsp; Claim Your Prize &nbsp; ✦</div>
    </div>
    <div id="tab-bar">
      <button class="tab-btn active" data-src="submission/submission.html">🎡 Prize Wheel</button>
      <button class="tab-btn"        data-src="submission-slot-machine/submission.html">🎰 Slot Machine</button>
      <button class="tab-btn"        data-src="submission-scratch/submission.html">🃏 Scratch Card</button>
    </div>
    <div id="frame-wrap">
      <iframe id="game" src="submission/submission.html" allowtransparency="true"></iframe>
    </div>
  </div>

  <script>
    (function () {
      const container = document.getElementById('game-container');
      const iframe    = document.getElementById('game');
      const tabs      = document.querySelectorAll('.tab-btn');

      // Tier colour palette (matches each game's TIERS array order)
      var TIER_STYLES = [
        { bg: '#1a0033', color: '#ffd700', borderColor: '#ffd700',
          bannerBg: 'radial-gradient(ellipse at center, #1a0a2e 0%, #0d0618 70%, #000 100%)',
          titleColor: '#ffd700', titleGlow: '0 0 12px #ff9900, 0 0 28px #ff4400, 0 0 48px #ff4400, 3px 3px 0 #5a0000',
          subColor: '#ff9900', lineColor: '#ffd700',
          bulbs: ['#ff0044','#ffd700','#00ffcc','#ff6600','#aa00ff','#00aaff'] },
        { bg: '#2a1400', color: '#ffe066', borderColor: '#ffe066',
          bannerBg: 'radial-gradient(ellipse at center, #2a1500 0%, #1a0c00 70%, #000 100%)',
          titleColor: '#ffe066', titleGlow: '0 0 12px #ffcc00, 0 0 28px #ff9900, 0 0 48px #ff6600, 3px 3px 0 #5a2000',
          subColor: '#ffaa44', lineColor: '#ffe066',
          bulbs: ['#ffd700','#ffaa00','#ffe066','#ff8800','#ffcc44','#ffdd88'] },
        { bg: '#001828', color: '#aaddff', borderColor: '#00ccff',
          bannerBg: 'radial-gradient(ellipse at center, #001828 0%, #000d18 70%, #000 100%)',
          titleColor: '#aaddff', titleGlow: '0 0 12px #00ccff, 0 0 28px #0088ff, 0 0 48px #0044cc, 3px 3px 0 #001a44',
          subColor: '#66bbff', lineColor: '#00ccff',
          bulbs: ['#00ccff','#0088ff','#aaddff','#0044cc','#66bbff','#88ddff'] },
      ];

      // Build flanking bulbs
      function buildBulbs(el, colors) {
        el.innerHTML = '';
        for (var i = 0; i < 7; i++) {
          var b = document.createElement('div');
          b.className = 'bb';
          var c = colors[i % colors.length];
          b.style.color = c; b.style.background = c;
          b.style.animationDelay = (i * 0.13) + 's';
          el.appendChild(b);
        }
      }
      buildBulbs(document.getElementById('bulbs-left'),  TIER_STYLES[0].bulbs);
      buildBulbs(document.getElementById('bulbs-right'), TIER_STYLES[0].bulbs);

      function setActiveTierColor(tierIndex) {
        var s = TIER_STYLES[tierIndex] || TIER_STYLES[0];
        var activeTab = document.querySelector('.tab-btn.active');
        if (activeTab) {
          activeTab.style.background        = s.bg;
          activeTab.style.borderBottomColor = s.bg;
          activeTab.style.color             = s.color;
          activeTab.style.borderTopColor    = s.borderColor;
          activeTab.style.borderLeftColor   = s.borderColor;
          activeTab.style.borderRightColor  = s.borderColor;
        }
        document.getElementById('tab-bar').style.borderBottomColor = s.borderColor;
        // Update banner
        var banner = document.getElementById('banner');
        banner.style.background = s.bannerBg;
        var title = document.getElementById('banner-title');
        title.style.color      = s.titleColor;
        title.style.textShadow = s.titleGlow;
        document.getElementById('banner-sub').style.color = s.subColor;
        // Update rule lines
        var ruleGrad = 'linear-gradient(90deg, transparent, ' + s.lineColor + ', transparent)';
        document.querySelectorAll('.banner-rule').forEach(function(r) { r.style.background = ruleGrad; });
        // Rebuild bulbs
        buildBulbs(document.getElementById('bulbs-left'),  s.bulbs);
        buildBulbs(document.getElementById('bulbs-right'), s.bulbs);
      }

      // Initialise to tier 0
      setActiveTierColor(0);

      // Scale container so banner + tabs + iframe all fit the viewport
      function scaleGame() {
        var scale = Math.min(1, window.innerWidth / 960, window.innerHeight / 704);
        container.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
      }
      scaleGame();
      window.addEventListener('resize', scaleGame);

      // Fire adStarted as soon as the iframe loads
      iframe.addEventListener('load', function () {
        iframe.contentWindow.postMessage({ type: 'adStarted' }, '*');
      });

      // Tab switching
      tabs.forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (btn.classList.contains('active')) return;
          tabs.forEach(function (t) {
            t.classList.remove('active');
            t.removeAttribute('style'); // clear any inline tier color from previous session
          });
          btn.classList.add('active');
          setActiveTierColor(0); // reset to base tier until game reports its own tier
          iframe.src = btn.dataset.src;
        });
      });

      // Relay messages from the submission
      window.addEventListener('message', function (event) {
        if (!event.data || !event.data.type) return;
        // On success/fail, reload the current game rather than the whole page
        if (event.data.type === 'success' || event.data.type === 'fail') {
          setTimeout(function () {
            const activeTab = document.querySelector('.tab-btn.active');
            iframe.src = activeTab ? activeTab.dataset.src : 'submission/submission.html';
          }, 800);
        }
        // Tier upgrade — update the active tab colour to match
        if (event.data.type === 'tierChange') {
          setActiveTierColor(event.data.tier);
        }
        // pause/play/seekTo etc. have no video here — silently ignored
      });
    })();
  </script>
</body>
</html>
